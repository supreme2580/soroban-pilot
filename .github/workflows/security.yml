name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [master]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Run audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
